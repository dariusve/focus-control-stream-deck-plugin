<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scarlett Air Settings</title>
    <style>
      body {
        margin: 12px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f1f1f1;
        background: #202020;
      }
      label {
        display: block;
        margin-bottom: 10px;
      }
      input,
      select {
        width: 100%;
        padding: 7px;
        border-radius: 6px;
        border: 1px solid #666;
        background: #2d2d2d;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <label>
      Command
      <select id="command">
        <option value="toggle">Toggle</option>
        <option value="enable">Enable</option>
        <option value="disable">Disable</option>
      </select>
    </label>

    <label>
      Channel
      <input id="channel" type="number" value="1" min="1" max="8" />
    </label>

    <script src="index.js"></script>
  </body>
</html>
